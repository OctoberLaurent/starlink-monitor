name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------------------- #
  #  Qualité : lint, formatage, analyse de types, tests unitaires
  #  (matrice Python 3.11 / 3.12 / 3.13)
  # ----------------------------------------------------------------------- #
  quality:
    name: Lint, types & unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask pytest ruff black mypy

      - name: Ruff (lint)
        run: ruff check .

      - name: Black (formatting)
        run: black --check .

      - name: Mypy (static type analysis, strict)
        run: mypy

      - name: Pytest (unit tests)
        run: pytest -v

  # ----------------------------------------------------------------------- #
  #  Test de fumée : boote réellement l'app Flask en mode démo et vérifie
  #  que la page + l'API répondent (intégration réelle, pas juste unitaire).
  # ----------------------------------------------------------------------- #
  smoke:
    name: Smoke test (real app boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Flask
        run: |
          python -m pip install --upgrade pip
          pip install flask requests

      - name: Boot app in demo mode
        run: |
          STARLINK_DEMO=1 PORT=5099 python app.py &
          echo $! > /tmp/app.pid
          # attend que le serveur écoute (max ~20s)
          for i in $(seq 1 20); do
            if curl -sf http://127.0.0.1:5099/ >/dev/null; then break; fi
            sleep 1
          done

      - name: Check page and API
        run: |
          set -e
          # page HTML
          code=$(curl -s -o /tmp/page.html -w "%{http_code}" http://127.0.0.1:5099/)
          echo "GET / -> HTTP $code"
          [ "$code" = "200" ]
          grep -q "Starlink Incident Monitor" /tmp/page.html
          # asset statique (Chart.js bundlé)
          code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5099/static/chart.umd.min.js)
          echo "GET /static/chart.umd.min.js -> HTTP $code"
          [ "$code" = "200" ]
          # API state (one-liners pour rester valide en YAML)
          curl -sf http://127.0.0.1:5099/api/state | python -c "import sys,json; d=json.load(sys.stdin); assert d['demo'] is True, 'demo attendu'; assert 'samples' in d and 'incidents' in d, 'shape manquante'; print('API /api/state OK — demo:', d['demo'], '| polls:', d['poll_count'])"
          # API incidents
          curl -sf http://127.0.0.1:5099/api/incidents | python -c "import sys,json; d=json.load(sys.stdin); assert {'incidents','open','total'} <= set(d), 'shape manquante'; print('API /api/incidents OK')"

      - name: Tear down
        if: always()
        run: |
          if [ -f /tmp/app.pid ]; then kill "$(cat /tmp/app.pid)" 2>/dev/null || true; fi

  # ----------------------------------------------------------------------- #
  #  Security scan: bandit (Python security lint), pip-audit (CVE on deps),
  #  gitleaks (hardcoded secrets) — blocking. Semgrep is informational.
  # ----------------------------------------------------------------------- #
  security:
    name: Security scan (bandit, pip-audit, gitleaks, semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit semgrep

      - name: Bandit (Python security lint)
        run: |
          # B311 random (demo simulator, not crypto), B404 import subprocess,
          # B101 asserts in tests. Subprocess calls are list-based with a
          # validated host:port target (see # nosec annotations).
          bandit -s B311,B404,B101 -x .venv,build,dist -r \
            app.py launcher.py build_icon.py tests/

      - name: pip-audit (dependencies CVE)
        run: pip-audit -r requirements.txt -r requirements-dev.txt

      - name: Gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semgrep (informational, non-blocking)
        # Reports findings without failing the build. The single finding
        # (subprocess + env-derived target) is a false positive: list-based
        # call with a validated host:port (see app._validate_target).
        run: semgrep --config=p/python app.py launcher.py || true

  # ----------------------------------------------------------------------- #
  #  Frontend lint: ESLint + Prettier on the extracted JS/CSS/HTML.
  # ----------------------------------------------------------------------- #
  frontend:
    name: Frontend lint (ESLint + Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint static/app.js

      - name: Prettier (format check)
        run: npx prettier --check static/app.js static/style.css templates/index.html